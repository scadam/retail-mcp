<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg_caramel_latte" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C1810;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0d08;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glow_caramel_latte" cx="75%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#5C3317;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#1a0d08;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg_caramel_latte)"/>
  <rect width="400" height="200" fill="url(#glow_caramel_latte)"/>
  <text x="24" y="22" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#C8A951" letter-spacing="2">COSTA COFFEE®</text>
  <defs>
    <linearGradient id="carliq" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5A2B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2C1008;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Cup -->
  <rect x="272" y="60" width="66" height="110" rx="5" fill="url(#carliq)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Whipped cream dome -->
  <ellipse cx="305" cy="62" rx="33" ry="12" fill="#F8F2E8"/>
  <ellipse cx="305" cy="56" rx="25" ry="9" fill="white"/>
  <ellipse cx="305" cy="50" rx="16" ry="7" fill="white"/>
  <ellipse cx="305" cy="46" rx="8" ry="5" fill="white"/>
  <!-- Caramel drizzle zigzag -->
  <path d="M284,52 L290,46 L296,52 L302,46 L308,52 L314,46 L320,52 L326,46" fill="none" stroke="#C8A951" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M286,58 L294,50 L302,58 L310,50 L318,58 L326,50" fill="none" stroke="#C8A951" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <!-- Sleeve -->
  <rect x="272" y="100" width="66" height="30" rx="3" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Cup highlight -->
  <line x1="276" y1="68" x2="278" y2="165" stroke="rgba(255,255,255,0.15)" stroke-width="3" stroke-linecap="round"/>
  <text x="24" y="175" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="white">Caramel Latte</text>
  <rect y="190" width="400" height="10" fill="#C8A951" opacity="0.6"/>
</svg>