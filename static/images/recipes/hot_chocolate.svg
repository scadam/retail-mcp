<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg_hot_chocolate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C1810;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0d08;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glow_hot_chocolate" cx="75%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#5C3317;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#1a0d08;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg_hot_chocolate)"/>
  <rect width="400" height="200" fill="url(#glow_hot_chocolate)"/>
  <text x="24" y="22" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#C8A951" letter-spacing="2">COSTA COFFEE®</text>
  <defs>
    <linearGradient id="hchocsurface" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3D1808;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0804;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Wide mug body -->
  <rect x="258" y="88" width="94" height="80" rx="8" fill="url(#hchocsurface)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Mug rim/top -->
  <ellipse cx="305" cy="88" rx="47" ry="10" fill="#2C1008" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Chocolate surface -->
  <ellipse cx="305" cy="88" rx="44" ry="8" fill="#3D1808"/>
  <!-- Marshmallows on top -->
  <rect x="283" y="80" width="18" height="12" rx="4" fill="white" stroke="#E8E0D0" stroke-width="1"/>
  <rect x="297" y="78" width="16" height="12" rx="4" fill="white" stroke="#E8E0D0" stroke-width="1"/>
  <rect x="311" y="80" width="17" height="12" rx="4" fill="white" stroke="#E8E0D0" stroke-width="1"/>
  <!-- Cocoa dusting on marshmallows -->
  <rect x="284" y="81" width="16" height="4" rx="2" fill="rgba(80,30,5,0.15)"/>
  <rect x="298" y="79" width="14" height="4" rx="2" fill="rgba(80,30,5,0.15)"/>
  <rect x="312" y="81" width="15" height="4" rx="2" fill="rgba(80,30,5,0.15)"/>
  <!-- Mug handle -->
  <path d="M352,100 Q372,100 372,128 Q372,155 352,155" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="5" stroke-linecap="round"/>
  <path d="M352,100 Q365,100 365,128 Q365,155 352,155" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Steam -->
  <path d="M290,75 Q286,65 290,55" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  <path d="M305,73 Q301,63 305,53" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  <path d="M320,75 Q316,65 320,55" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  <text x="24" y="175" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="white">Hot Chocolate</text>
  <rect y="190" width="400" height="10" fill="#C8A951" opacity="0.6"/>
</svg>