<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg_cold_brew" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C1810;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0d08;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glow_cold_brew" cx="75%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#5C3317;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#1a0d08;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg_cold_brew)"/>
  <rect width="400" height="200" fill="url(#glow_cold_brew)"/>
  <text x="24" y="22" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#C8A951" letter-spacing="2">COSTA COFFEE®</text>
  <defs>
    <linearGradient id="cbliq" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0804;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d0402;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Tall glass -->
  <path d="M276,48 L282,170 L328,170 L334,48 Z" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Glass rim -->
  <ellipse cx="305" cy="48" rx="29" ry="7" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <!-- Cold brew liquid (very dark) -->
  <path d="M280,55 L283,168 L327,168 L330,55 Z" fill="url(#cbliq)"/>
  <!-- Ice cubes -->
  <rect x="285" y="62" width="18" height="16" rx="3" fill="rgba(200,230,245,0.45)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <rect x="306" y="58" width="16" height="18" rx="3" fill="rgba(200,230,245,0.4)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <rect x="286" y="82" width="15" height="14" rx="3" fill="rgba(200,230,245,0.35)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <rect x="305" y="80" width="17" height="15" rx="3" fill="rgba(200,230,245,0.4)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <!-- Ice refraction highlights -->
  <line x1="287" y1="64" x2="291" y2="64" stroke="rgba(255,255,255,0.6)" stroke-width="1" stroke-linecap="round"/>
  <line x1="308" y1="60" x2="312" y2="60" stroke="rgba(255,255,255,0.6)" stroke-width="1" stroke-linecap="round"/>
  <!-- Condensation dots on glass -->
  <circle cx="280" cy="90" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="282" cy="108" r="1" fill="rgba(255,255,255,0.25)"/>
  <circle cx="330" cy="95" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="328" cy="115" r="1" fill="rgba(255,255,255,0.25)"/>
  <!-- Glass highlights -->
  <line x1="283" y1="56" x2="285" y2="164" stroke="rgba(255,255,255,0.2)" stroke-width="3" stroke-linecap="round"/>
  <text x="24" y="175" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="white">Cold Brew</text>
  <rect y="190" width="400" height="10" fill="#C8A951" opacity="0.6"/>
</svg>