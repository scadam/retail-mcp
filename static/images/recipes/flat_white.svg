<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg_flat_white" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C1810;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0d08;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glow_flat_white" cx="75%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#5C3317;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#1a0d08;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg_flat_white)"/>
  <rect width="400" height="200" fill="url(#glow_flat_white)"/>
  <text x="24" y="22" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#C8A951" letter-spacing="2">COSTA COFFEE®</text>
  <!-- Saucer -->
  <ellipse cx="305" cy="168" rx="52" ry="8" fill="#D4C4A8" stroke="#B8A888" stroke-width="1.5"/>
  <!-- Cup outer -->
  <path d="M270,110 L276,165 L334,165 L340,110 Z" fill="white" stroke="#E0D8CC" stroke-width="1.5"/>
  <!-- Cup inner - coffee -->
  <path d="M274,113 L278,162 L332,162 L336,113 Z" fill="#3D1F0D"/>
  <!-- Foam top -->
  <ellipse cx="305" cy="113" rx="35" ry="9" fill="#F5F0E8" stroke="#E0D8CC" stroke-width="1.5"/>
  <!-- Latte art - pour pattern circles -->
  <ellipse cx="305" cy="113" rx="18" ry="5" fill="none" stroke="rgba(80,40,15,0.4)" stroke-width="1.5"/>
  <ellipse cx="305" cy="113" rx="8" ry="3" fill="none" stroke="rgba(80,40,15,0.4)" stroke-width="1.2"/>
  <circle cx="305" cy="113" r="2" fill="rgba(80,40,15,0.5)"/>
  <!-- Cup handle -->
  <path d="M340,118 Q358,118 358,138 Q358,155 340,155" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <path d="M340,118 Q352,118 352,138 Q352,155 340,155" fill="none" stroke="#E0D8CC" stroke-width="1.5"/>
  <text x="24" y="175" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="white">Flat White</text>
  <rect y="190" width="400" height="10" fill="#C8A951" opacity="0.6"/>
</svg>